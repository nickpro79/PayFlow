services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: payflow-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Passw0rd
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

  redis:
    image: redis:latest
    container_name: payflow-redis
    ports:
      - "6379:6379"

volumes:
  sqlserver-data: